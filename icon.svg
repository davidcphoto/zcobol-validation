<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1e1e1e" stroke="#3e3e42" stroke-width="3"/>

  <!-- Letter Z in bold, COBOL/mainframe style - GREY -->
  <g fill="#9CA3AF" stroke="#9CA3AF" stroke-width="2">
    <!-- Top horizontal line of Z -->
    <rect x="25" y="35" width="50" height="10" rx="2"/>
    <!-- Diagonal line of Z -->
    <polygon points="25,45 75,45 30,78 35,83 85,45 85,35 25,88"/>
    <!-- Bottom horizontal line of Z -->
    <rect x="25" y="78" width="60" height="10" rx="2"/>
  </g>

  <!-- Circle background for check mark -->
  <circle cx="88" cy="25" r="18" fill="#1e1e1e" stroke="#0078D4" stroke-width="3"/>

  <!-- Check mark (blue) -->
  <g fill="none" stroke="#0078D4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="78,25 85,32 98,19"/>
  </g>
</svg>
